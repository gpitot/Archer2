<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archer Map Editor</title>
  <style>
    :root {
      --bg: #14161a;
      --panel: #1e2128;
      --panel-2: #262a33;
      --text: #cfd3dc;
      --accent: #d8a437;
      --border: #343946;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      display: grid;
      grid-template-rows: 42px 1fr 26px;
      grid-template-columns: 210px 1fr;
      grid-template-areas: "top top" "palette view" "status status";
      background: var(--bg);
      color: var(--text);
      font: 13px/1.4 system-ui, sans-serif;
    }

    #topbar {
      grid-area: top;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    #topbar .brand { color: var(--accent); font-weight: 600; margin-right: 6px; }
    #topbar .sep { flex: 0 0 1px; height: 22px; background: var(--border); }
    #topbar input, #topbar select, #topbar button, #palette button, dialog button, dialog input {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font: inherit;
    }
    #map-name { width: 140px; }
    #map-label.dirty { color: var(--accent); }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }
    button.active { border-color: var(--accent); color: var(--accent); }

    #palette {
      grid-area: palette;
      overflow-y: auto;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #palette .tool { display: flex; align-items: center; gap: 8px; text-align: left; }
    kbd {
      background: #0d0e11;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 5px;
      min-width: 22px;
      text-align: center;
      font: 11px monospace;
      color: var(--accent);
    }
    .context-row { display: none; gap: 4px; flex-wrap: wrap; padding: 4px 0 8px; }
    .context-row.column { flex-direction: column; }
    .swatch { width: 30px; height: 22px; padding: 0; }
    .swatch.active { outline: 2px solid var(--accent); }

    #viewport { grid-area: view; position: relative; overflow: hidden; }
    #viewport canvas { display: block; }

    #status {
      grid-area: status;
      padding: 3px 12px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      color: #9aa1ad;
      white-space: nowrap;
      overflow: hidden;
    }
    #status.flash { animation: flash 1.2s ease-out; }
    @keyframes flash { 0% { color: var(--accent); } 100% { color: #9aa1ad; } }

    #help {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 20px;
      max-height: 75vh;
      overflow-y: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,.5);
    }
    #help h2 { margin: 0 0 8px; font-size: 15px; color: var(--accent); }
    #help td { padding: 2px 10px 2px 0; }

    dialog {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    dialog::backdrop { background: rgba(0,0,0,.55); }
    dialog form { display: flex; flex-direction: column; gap: 10px; min-width: 260px; }
    dialog label { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    dialog input { width: 110px; }
  </style>
</head>
<body>
  <div id="topbar"></div>
  <div id="palette"></div>
  <div id="viewport"></div>
  <div id="status">loading…</div>
  <div id="help" style="display:none"></div>

  <dialog id="new-dialog">
    <form method="dialog">
      <strong>New map</strong>
      <label>Name <input id="new-name" value="mymap" spellcheck="false" pattern="[a-z0-9][a-z0-9_-]*" /></label>
      <label>Width (tiles) <input id="new-x" type="number" value="32" min="8" max="128" /></label>
      <label>Height (tiles) <input id="new-z" type="number" value="32" min="8" max="128" /></label>
      <button type="submit">Create</button>
    </form>
  </dialog>

  <script type="module" src="/src/editor/main.ts"></script>
</body>
</html>
